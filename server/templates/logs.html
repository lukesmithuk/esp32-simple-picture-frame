<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — {{ frame.mac_address }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="inner">
            <a href="/" class="site-title"><span class="icon"></span> Photo Frame</a>
        </div>
    </header>

    <div class="container">
        <a href="/" class="back-link">Back to dashboard</a>

        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Device Logs</h2>
                <span class="section-count mac">{{ frame.mac_address }}</span>
            </div>

            <div class="log-meta">
                <span class="label">Last seen</span>
                <span class="last-seen" data-utc="{{ frame.last_seen or '' }}">{{ frame.last_seen or "never" }}</span>
            </div>

            {% if logs %}
            <pre class="logs-box">{{ logs }}</pre>
            {% else %}
            <p class="logs-empty">No logs received from this frame yet.</p>
            {% endif %}
        </section>
    </div>

    <script>
        document.querySelectorAll('[data-utc]').forEach(function(el) {
            var utc = el.getAttribute('data-utc');
            if (!utc) return;
            var d = new Date(utc);
            if (isNaN(d)) return;
            el.textContent = d.toLocaleString();
        });
    </script>
</body>
</html>
