<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — {{ frame.mac_address }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1><a href="/">Photo Frame Server</a></h1>

    <h2>Logs — {{ frame.mac_address }}</h2>
    <p>Last seen: {{ frame.last_seen or "never" }}</p>

    {% if logs %}
    <pre class="logs">{{ logs }}</pre>
    {% else %}
    <p>No logs received from this frame yet.</p>
    {% endif %}
</body>
</html>
