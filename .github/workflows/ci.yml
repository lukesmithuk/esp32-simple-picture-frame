name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: ghcr.io/lukesmithuk/esp32-simple-picture-frame

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install -r server/requirements.txt
      - name: Lint
        working-directory: server
        run: python -m ruff check .
      - name: Test
        working-directory: server
        run: python -m pytest -q

  # Build each platform on its own runner in parallel, boot-and-smoke the freshly
  # built image, then (push only) push it by digest for the merge job to stitch
  # into one multi-arch manifest. armv7 runs on the arm64 runner (aarch32,
  # near-native) so it builds fast and can be booted for the smoke test.
  build:
    runs-on: ${{ matrix.runner }}
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}
      - uses: actions/checkout@v5
      # QEMU/binfmt is only needed for the emulated arm/v7 leg; amd64 and arm64
      # build natively on their own runners. Limiting it here also avoids the two
      # arm jobs racing on the same binfmt cache key.
      - uses: docker/setup-qemu-action@v4
        if: matrix.platform == 'linux/arm/v7'
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and load
        uses: docker/build-push-action@v7
        with:
          context: ./server
          platforms: ${{ matrix.platform }}
          load: true
          tags: photoframe-smoke:latest
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
      - name: Smoke test
        run: |
          docker run -d --rm --name pf-smoke -p 8080:8080 photoframe-smoke:latest
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then echo " OK"; exit 0; fi
            sleep 2
          done
          echo "healthz never came up"; docker logs pf-smoke; exit 1
      - name: Stop smoke container
        if: always()
        run: docker rm -f pf-smoke || true
      - name: Push by digest
        id: push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
      - name: Export digest
        if: github.event_name == 'push'
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
        env:
          digest: ${{ steps.push.outputs.digest }}
      - name: Upload digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)
      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
